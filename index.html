<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Database & Cloud Quiz</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        text-align: center;
        padding: 40px;
    }

    .quiz-container {
        background: rgba(0,0,0,0.6);
        padding: 30px;
        border-radius: 15px;
        max-width: 800px;
        margin: auto;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    .option-btn {
        display: block;
        width: 100%;
        margin: 8px 0;
        background: #3498db;
        color: white;
    }

    .option-btn:hover {
        background: #2980b9;
    }

    #nextBtn {
        background: #2ecc71;
        display: none;
    }

    #scoreContainer {
        display: none;
        font-size: 20px;
    }

.selected {
    background-color: #f1c40f !important;
    color: black;
}
</style>
</head>

<body>


<div class="quiz-container" id="quizBox">
    <h2>Advanced Database Integration & Cloud Technologies Quiz</h2>
<!-- Instructions -->
<div id="instructionBox" style="
    background: rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    text-align:left;
">
    <h3>📌 General Instructions</h3>
    <ul>
        <li>Read each question carefully.</li>
        <li>Select only ONE answer.</li>
        <li>Once selected, answer cannot be changed.</li>
        <li>Do not refresh or leave the page.</li>
        <li>Switching tabs will terminate the quiz.</li>
    </ul>

    <div style="text-align:center; margin-top:15px;">
        <button id="startBtn" style="background:#f39c12;">Start Quiz</button>
    </div>
</div>

<!-- Quiz Content (Hidden at First) -->
<div id="question" style="display:none;"></div>
<div id="options" style="display:none;"></div>
<button id="nextBtn">Next Question</button>
</div>

<div id="scoreContainer"></div>

<script>
if(localStorage.getItem("quizCompleted") === "true"){
    document.getElementById("quizBox").style.display = "none";
    document.getElementById("scoreContainer").style.display = "block";
    document.getElementById("scoreContainer").innerHTML = 
        "<h2>You have already completed this quiz.</h2>";
} else {

const quiz = [

{
q: "Why is database integration important in application development?",
options: [
"To make applications static",
"To allow storing and retrieving dynamic data",
"To remove the need for programming languages",
"To eliminate the need for servers"
],
answer: 1
},

{
q: "Which of the following is used to communicate with databases?",
options: [
"HTML",
"CSS",
"SQL",
"Photoshop"
],
answer: 2
},

{
q: "What is the main purpose of database design?",
options: [
"To decorate tables",
"To organize data efficiently and avoid duplication",
"To slow down the system",
"To increase hardware cost"
],
answer: 1
},

{
q: "In a school information system, where are student grades stored?",
options: [
"In the browser cache",
"In the database",
"In a design template",
"In the login form"
],
answer: 1
},

{
q: "Which table helps connect students and courses in a relational design?",
options: [
"Users table",
"Enrollment table",
"Admin table",
"Login table"
],
answer: 1
},

{
q: "What is the purpose of normalization?",
options: [
"Increase redundancy",
"Reduce duplicate data",
"Delete all records",
"Slow down queries"
],
answer: 1
},

{
q: "Which is part of database implementation?",
options: [
"Creating tables and defining keys",
"Designing logos",
"Installing antivirus",
"Editing images"
],
answer: 0
},

{
q: "Why are primary and foreign keys important?",
options: [
"They increase storage size",
"They define relationships and maintain data integrity",
"They delete duplicate data automatically",
"They design the UI"
],
answer: 1
},

{
q: "Which is a database management practice?",
options: [
"Disabling backups",
"Weekly data backup",
"Sharing admin passwords",
"Ignoring security"
],
answer: 1
},

{
q: "What is the main purpose of user access control?",
options: [
"Allow everyone to edit data",
"Protect sensitive information",
"Delete database records",
"Speed up internet"
],
answer: 1
},

{
q: "What is cloud computing?",
options: [
"Using local hardware only",
"Storing data on USB drives",
"Using internet-based servers and services",
"Installing software without internet"
],
answer: 2
},

{
q: "How does cloud computing help developers?",
options: [
"They must buy expensive servers",
"They can quickly create servers and databases",
"They cannot scale applications",
"They must manually configure hardware"
],
answer: 1
},

{
q: "Which is a benefit of scalability in cloud computing?",
options: [
"Apps cannot grow",
"Apps handle more users automatically",
"Apps become offline",
"Apps lose data"
],
answer: 1
},

{
q: "Why is cloud computing cost-effective?",
options: [
"You pay for unused resources",
"You buy physical servers yearly",
"You pay only for what you use",
"You install everything locally"
],
answer: 2
},

{
q: "Which is an example of a cloud-based application mentioned in the lesson?",
options: [
"Calculator app",
"Google Drive",
"Notepad",
"MS Paint"
],
answer: 1
},

{
q: "What does deployment mean in cloud platforms?",
options: [
"Deleting the app",
"Making the application live for users",
"Designing the database",
"Installing Windows"
],
answer: 1
},

{
q: "Which cloud service is used to store images and videos?",
options: [
"Virtual servers",
"Authentication",
"Storage",
"Antivirus"
],
answer: 2
},

{
q: "What is authentication used for in cloud services?",
options: [
"Managing user logins",
"Designing tables",
"Increasing RAM",
"Deleting backups"
],
answer: 0
},

{
q: "Why is database backup important?",
options: [
"To increase errors",
"To prevent data loss",
"To remove security",
"To slow performance"
],
answer: 1
},

{
q: "Which step comes after developing an application before launching it online?",
options: [
"Destroying the database",
"Uploading code to the cloud server",
"Removing users",
"Disconnecting the database"
],
answer: 1
}

];

let currentQuestion = 0;
let score = 0;
let answered = false;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function loadQuestion(){
    answered = false;
    nextBtn.style.display = "none";
    const q = quiz[currentQuestion];
    questionEl.innerHTML = "<h3>Question " + (currentQuestion+1) + " of 20</h3><p>" + q.q + "</p>";
    optionsEl.innerHTML = "";

    q.options.forEach((option, index)=>{
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.classList.add("option-btn");
        btn.onclick = () => selectAnswer(index);
        optionsEl.appendChild(btn);
    });
}

function selectAnswer(index){
    if(answered) return;
    answered = true;

    const buttons = document.querySelectorAll(".option-btn");

    buttons.forEach((btn, i) => {
        btn.disabled = true;

        if(i === index){
            btn.classList.add("selected");
        }
    });

    if(index === quiz[currentQuestion].answer){
        score++;
    }

    nextBtn.style.display = "inline-block";
}

nextBtn.onclick = () => {
    currentQuestion++;
    if(currentQuestion < quiz.length){
        loadQuestion();
    } else {
        finishQuiz();
    }
};

function finishQuiz(){
    document.getElementById("quizBox").style.display = "none";
    document.getElementById("scoreContainer").style.display = "block";
    document.getElementById("scoreContainer").innerHTML =
        "<h2>Quiz Completed</h2>" +
        "<p>Your Total Correct Score: <strong>" + score + " / 20</strong></p>" +
        "<p>You cannot retake this quiz.</p>";

    localStorage.setItem("quizCompleted", "true");
}

document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        document.body.innerHTML = `
            <div style="
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                background:black;
                color:red;
                font-size:40px;
                font-weight:bold;
                text-align:center;
            ">
                CHEATER ❌<br>
                You minimized or switched tabs.<br>
                Quiz terminated.
            </div>
        `;
    }
});
const startBtn = document.getElementById("startBtn");
const instructionBox = document.getElementById("instructionBox");

startBtn.onclick = function(){
    instructionBox.style.display = "none";
    questionEl.style.display = "block";
    optionsEl.style.display = "block";
    loadQuestion();
};

shuffleArray(quiz);


}
</script>

</body>
</html>
